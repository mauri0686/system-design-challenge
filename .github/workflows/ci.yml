name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore rate-limiter/RateLimiter.sln

      - name: Verify formatting
        run: dotnet format rate-limiter/RateLimiter.sln --verify-no-changes --no-restore

      - name: Build, analyze, test, and enforce coverage
        run: >
          dotnet test rate-limiter/RateLimiter.sln
          --configuration Release
          --no-restore
          --nologo
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./TestResults/coverage.cobertura.xml
          /p:Threshold=80
          /p:ThresholdType=line%2cbranch

      - name: Build and smoke-test container
        run: |
          docker build --tag rate-limiter:ci ./rate-limiter
          docker run --detach --name rate-limiter-smoke \
            --publish 127.0.0.1:8080:8080 \
            --env RateLimit__TokensPerSecond=0.0001 \
            rate-limiter:ci
          trap 'docker rm --force rate-limiter-smoke' EXIT

          ready=false
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080/health > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done
          test "$ready" = true

          for request in {1..5}; do
            test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
              http://127.0.0.1:8080/api/quotes/AAPL)" = 200
          done
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:8080/api/quotes/AAPL)" = 429
